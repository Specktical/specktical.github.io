<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Реєстрація в конкурсі</title>

  

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      font-size: 20px;
    }

    .container {
      max-width: 460px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 26px;
      font-size: 28px;
      text-align: center;
      line-height: 1.2;
    }

    label {
      display: block;
      margin-top: 22px;
      margin-bottom: 10px;
      font-weight: bold;
      font-size: 22px;
    }

    .phone-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phone-prefix {
      flex: 0 0 auto;
      padding: 15px 12px;
      border-radius: 12px;
      background: #eef2f7;
      border: 2px solid #cfd8e3;
      font-size: 24px;
      font-weight: bold;
      color: #222;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 24px;
      border: 2px solid #cfd8e3;
      border-radius: 12px;
      outline: none;
    }

    input:focus {
      border-color: #1e88e5;
    }

    .tickets-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }


    .ticket-add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    #manualTicket {
      flex: 1;
      min-width: 0;
    }

    #addTicketBtn {
      flex: 0 0 auto;
      padding: 0 18px;
      border: none;
      border-radius: 12px;
      background: #3a3a3a;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    #addTicketBtn:active {
      background: #202020;
    }

    .ticket-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #f1f5f9;
      border-radius: 12px;
      font-size: 22px;
      font-weight: bold;
    }

    .delete-ticket {
      border: none;
      background: #ffebee;
      color: #c62828;
      font-size: 26px;
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
    }

    .empty-tickets {
      padding: 14px;
      color: #777;
      background: #f8f8f8;
      border-radius: 12px;
      font-size: 19px;
      text-align: center;
    }

    .hint {
      margin-top: 8px;
      font-size: 17px;
      line-height: 1.35;
      color: #666;
    }

    .hex-row {
      display: flex;
      justify-content: space-between;
      gap: 2px;
      margin-top: 16px;
    }

    .hex-wrap {
      width: 98px;
      height: 88px;
      padding: 1px;
      background: #3a3a3a;
      clip-path: polygon(
              25% 0%,
              75% 0%,
              100% 50%,
              75% 100%,
              25% 100%,
              0% 50%
      );
    }

    .hex-input {
      width: 96px;
      height: 86px;

      border: none;
      padding: 0;

      background: white;
      color: #3a3a3a;

      font-size: 34px;
      font-weight: bold;
      text-align: center;

      clip-path: polygon(
              25% 0%,
              75% 0%,
              100% 50%,
              75% 100%,
              25% 100%,
              0% 50%
      );

      transition: background .2s,color .2s;
    }

    .hex-input:focus {
      outline: none;
      background: orange;
      color: #3a3a3a;
    }

    .hex-input.filled {
      background: #f7941d;
      color: #3a3a3a;
    }

    .hex-input::placeholder {
      color: #8a8a8a;
    }

    .hex-input:focus {
      outline: none;
    }

    .hex-wrap:has(.hex-input:focus) {
      background: #202020;
    }

    .submit-btn {
      width: 100%;
      margin-top: 28px;
      padding: 17px;
      border: none;
      border-radius: 14px;
      background: #1e88e5;
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:active {
      background: #1565c0;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);

      justify-content: center;
      align-items: center;

      z-index: 9999;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {

      width: calc(100% - 40px);
      max-width: 420px;

      background: white;
      border-radius: 18px;

      padding: 35px 25px;

      text-align: center;

      animation: popup .25s ease;
    }

    @keyframes popup{

      from{
        transform:scale(.85);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }

    }

    .modal-icon{

      width:90px;
      height:90px;

      margin:auto;

      border-radius:50%;

      background:#4caf50;

      color:white;

      font-size:52px;
      font-weight:bold;

      display:flex;
      justify-content:center;
      align-items:center;

    }

    .modal-title{

      margin:25px 0;

      font-size:30px;
      font-weight:bold;
      line-height:1.3;

    }

    .modal-button{

      width:100%;

      padding:18px;

      border:none;
      border-radius:12px;

      background:#f7941d;
      color:white;

      font-size:24px;
      font-weight:bold;

      cursor:pointer;
    }

    @media (max-width: 390px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 18px;
      }

      .hex-wrap {
        width: 84px;
        height: 76px;
      }

      .hex-input {
        font-size: 30px;
      }

      .phone-prefix {
        font-size: 22px;
        padding: 15px 9px;
      }

      input {
        font-size: 22px;
      }
    }

    .scan-btn {
      width: 100%;
      margin: 18px 0;
      padding: 18px 20px;

      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;

      border: none;
      border-radius: 14px;

      background: #f7941d;
      color: white;

      font-size: 24px;
      font-weight: bold;

      cursor: pointer;

      box-shadow: 0 4px 10px rgba(247, 148, 29, .35);

      transition: all .15s ease;
    }

    .scan-btn:hover {
      background: #ea8a17;
    }

    .scan-btn:active {
      transform: scale(.97);
      box-shadow: none;
    }

    .scan-btn:disabled {
      background: #bdbdbd;
      box-shadow: none;
      cursor: default;
    }

    .hex-box {
      position: relative;
      width: 92px;
      height: 82px;
      background: #3a3a3a;
      clip-path: polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
    }

    .hex-box::after {
      content: "";
      position: absolute;
      inset: 3px;
      background: white;
      clip-path: polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
      z-index: 1;
    }

    .hex-box.filled::after,
    .hex-box:focus-within::after {
      background: #f7941d;
    }

    .hex-value {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a3a3a;
      font-size: 34px;
      font-weight: bold;
      pointer-events: none;
    }

    .hex-input {
      position: absolute;
      inset: 0;
      z-index: 3;
      opacity: 0;
    }

    .toast {

      position: fixed;

      left: 50%;
      bottom: 30px;

      transform: translateX(-50%) translateY(120px);

      background: #323232;
      color: white;

      padding: 16px 26px;

      border-radius: 14px;

      font-size: 22px;
      font-weight: bold;

      white-space: nowrap;

      box-shadow: 0 8px 24px rgba(0,0,0,.25);

      opacity: 0;

      transition: .3s;

      z-index: 10000;
    }

    .toast.show {

      opacity: 1;

      transform: translateX(-50%) translateY(0);

    }

  </style>
</head>

<body>
<div class="container">
  <h1>Реєстрація в конкурсі</h1>

  <form id="contestForm">
    <label for="phone">Номер телефону</label>
    <div class="phone-row">
      <div class="phone-prefix">+380</div>
      <input
              id="phone"
              name="phone"
              type="tel"
              inputmode="numeric"
              maxlength="9"
              placeholder="123456789"
              required
      />
    </div>

    <label for="manualTicket">Номери білетів</label>
    <ul id="ticketList" class="tickets-list"></ul>
    <div class="ticket-add-row">
      <input
              id="manualTicket"
              type="text"
              inputmode="numeric"
              placeholder="Введіть номер"
      />
      <button type="button" id="addTicketBtn">Додати</button>
    </div>

    <div id="qrReader"></div>

    <button type="button" id="scanTicketBtn" class="scan-btn">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
        <path d="M9 4l1.5-2h3L15 4h4a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2h4zm3 15a5 5 0 100-10 5 5 0 000 10zm0-2.2a2.8 2.8 0 110-5.6 2.8 2.8 0 010 5.6z"/>
      </svg>

      <span>Сканувати білет</span>
    </button>

    <div class="hint">Максимум 10 білетів. Номер можна додати вручну або автоматично з посилання ?number=1234567</div>

    <label>Введіть 4 різні двозначні числа</label>
    <div class="hex-row">
<!--      <div class="hex-wrap">-->
<!--        <input class="hex-input" type="text" inputmode="numeric" maxlength="2" placeholder="00" required />-->
<!--      </div>-->
<!--      <div class="hex-wrap">-->
<!--        <input class="hex-input" type="text" inputmode="numeric" maxlength="2" placeholder="00" required />-->
<!--      </div>-->
<!--      <div class="hex-wrap">-->
<!--        <input class="hex-input" type="text" inputmode="numeric" maxlength="2" placeholder="00" required />-->
<!--      </div>-->
<!--      <div class="hex-wrap">-->
<!--        <input class="hex-input" type="text" inputmode="numeric" maxlength="2" placeholder="00" required />-->
<!--      </div>-->
      <div class="hex-box">
        <input class="hex-input" type="text" inputmode="numeric" maxlength="2" required />
        <span class="hex-value">00</span>
      </div>
      <div class="hex-box">
        <input class="hex-input" type="text" inputmode="numeric" maxlength="2" required />
        <span class="hex-value">00</span>
      </div>
      <div class="hex-box">
        <input class="hex-input" type="text" inputmode="numeric" maxlength="2" required />
        <span class="hex-value">00</span>
      </div>
      <div class="hex-box">
        <input class="hex-input" type="text" inputmode="numeric" maxlength="2" required />
        <span class="hex-value">00</span>
      </div>
    </div>

    <button class="submit-btn" type="submit">Надіслати</button>
  </form>

  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="modal-icon">✓</div>

      <div class="modal-title">
        Ви зареєстровані<br>в конкурсі!
      </div>

      <button id="closeModal" type="button" class="modal-button">
        Закрити
      </button>
    </div>
  </div>
</div>

<div id="toast" class="toast">
  ✓ Білет успішно додано
</div>

<script>
  const form = document.getElementById('contestForm');
  const phoneInput = document.getElementById('phone');
  const ticketList = document.getElementById('ticketList');
  const manualTicketInput = document.getElementById('manualTicket');
  const addTicketBtn = document.getElementById('addTicketBtn');
  const successModal = document.getElementById('successModal');
  const closeModal = document.getElementById('closeModal');
  const hexInputs = Array.from(document.querySelectorAll('.hex-input'));
  const toast = document.getElementById('toast');

  const MAX_TICKETS = 10;
  const STORAGE_KEY = 'contestTickets';

  let toastTimer;

  function showToast(text) {

    toast.textContent = text;

    toast.classList.add('show');

    clearTimeout(toastTimer);

    toastTimer = setTimeout(() => {

      toast.classList.remove('show');

    }, 2000);

  }

  function getTickets() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }

  function saveTickets(tickets) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
  }

  function renderTickets() {
    const tickets = getTickets();
    ticketList.innerHTML = '';

    if (tickets.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-tickets';
      empty.textContent = 'Білети ще не додані';
      ticketList.appendChild(empty);
      return;
    }

    tickets.forEach((ticket, index) => {
      const li = document.createElement('li');
      li.className = 'ticket-item';

      const span = document.createElement('span');
      span.textContent = ticket;

      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'delete-ticket';
      button.textContent = '✕';
      button.addEventListener('click', () => {
        const updatedTickets = getTickets();
        updatedTickets.splice(index, 1);
        saveTickets(updatedTickets);
        renderTickets();
      });

      li.appendChild(span);
      li.appendChild(button);
      ticketList.appendChild(li);
    });
  }

  function addTicket(number) {
    const cleanNumber = number.replace(/\D/g, '');
    const tickets = getTickets();

    if (!cleanNumber) {
      alert('Введіть номер білета');
      return false;
    }

    if (tickets.includes(cleanNumber)) {
      alert('Такий білет вже додано');
      return false;
    }

    if (tickets.length >= MAX_TICKETS) {
      alert('Можна додати максимум 10 білетів');
      return false;
    }

    tickets.push(cleanNumber);
    saveTickets(tickets);
    renderTickets();
    return true;
  }

  function addTicketFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const number = params.get('number');

    if (!number) return;

    const cleanNumber = number.replace(/\D/g, '');
    const tickets = getTickets();

    if (cleanNumber && !tickets.includes(cleanNumber) && tickets.length < MAX_TICKETS) {
      tickets.push(cleanNumber);
      saveTickets(tickets);
    }
  }

  function validatePhone() {
    return /^\d{9}$/.test(phoneInput.value.trim());
  }

  function validateHexInputs() {
    const values = hexInputs.map(input => input.value.trim());

    const allFilled = values.every(value => /^\d{2}$/.test(value));
    const allUnique = new Set(values).size === values.length;

    return allFilled;
  }

  closeModal.addEventListener('click', () => {
    successModal.classList.remove('show');
  });

  phoneInput.addEventListener('input', () => {
    phoneInput.value = phoneInput.value.replace(/\D/g, '').slice(0, 9);
  });

  manualTicketInput.addEventListener('input', () => {
    manualTicketInput.value = manualTicketInput.value.replace(/\D/g, '');
  });

  addTicketBtn.addEventListener('click', () => {
    const added = addTicket(manualTicketInput.value);

    if (added) {
      manualTicketInput.value = '';
      manualTicketInput.focus();
    }
  });

  manualTicketInput.addEventListener('keydown', event => {
    if (event.key === 'Enter') {
      event.preventDefault();
      const added = addTicket(manualTicketInput.value);

      if (added) {
        manualTicketInput.value = '';
      }
    }
  });

  hexInputs.forEach((input, index) => {
    input.addEventListener('input', () => {
      const box = input.closest('.hex-box');
      const value = box.querySelector('.hex-value');

      value.textContent = input.value || '00';
      input.value = input.value.replace(/\D/g, '').slice(0, 2);

      if (input.value.length > 0) {
        input.classList.add('filled');
      } else {
        input.classList.remove('filled');
      }

      if (input.value.length === 2 && hexInputs[index + 1]) {
        hexInputs[index + 1].focus();
      }
    });

    input.addEventListener('keydown', event => {
      if (event.key === 'Backspace' && input.value.length === 0 && hexInputs[index - 1]) {
        hexInputs[index - 1].focus();
      }
    });
  });

  form.addEventListener('submit', event => {
    event.preventDefault();

    successModal.classList.remove('show');

    if (!validatePhone()) {
      alert('Введіть 9 цифр номера телефону після +380');
      return;
    }

    if (getTickets().length === 0) {
      alert('Додайте хоча б один номер білета');
      return;
    }

    if (!validateHexInputs()) {
      alert('Введіть 4 числа');
      return;
    }

    form.reset();
    localStorage.removeItem(STORAGE_KEY);
    renderTickets();

    hexInputs.forEach(input => input.classList.remove('filled'));

    successModal.classList.add('show');
  });

  addTicketFromUrl();
  renderTickets();
</script>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
  const scanTicketBtn = document.getElementById('scanTicketBtn');
  const qrFileInput = document.getElementById('qrFileInput');

  let qrScanner = null;
  let isProcessingQr = false;

  function handleQrResult(decodedText) {
    const text = String(decodedText || '').trim();

    let number = '';

    try {
      const url = new URL(text);
      number = url.searchParams.get('number') || '';
    } catch {
      // якщо QR повернув не URL, а просто текст
    }

    if (!number) {
      const decoded = decodeURIComponent(text);
      const match = decoded.match(/[?&]number=([^&#\s]+)/);
      number = match ? match[1] : '';
    }

    if (!number) {
      alert('QR-код не містить номера білета: ' + text);
      return false;
    }

    return addTicket(number);
  }

  scanTicketBtn.addEventListener('click', async () => {
    try {
      qrScanner = new Html5Qrcode("qrReader");

      await qrScanner.start(
              { facingMode: "environment" },
              { fps: 10, qrbox: 250 },
              decodedText => {
                if (isProcessingQr) return;

                isProcessingQr = true;

                const added = handleQrResult(decodedText);

                if (added) {
                  showToast('✓ Білет успішно додано');

                  setTimeout(() => {
                    if (qrScanner) {
                      qrScanner.stop().finally(() => {
                        isProcessingQr = false;
                      });
                    } else {
                      isProcessingQr = false;
                    }
                  }, 300);
                } else {
                  isProcessingQr = false;
                }
              }
      );
    } catch (error) {
      alert('Не вдалося запустити камеру. Спробуйте вибрати фото QR-коду.');
      console.error(error);
    }
  });
